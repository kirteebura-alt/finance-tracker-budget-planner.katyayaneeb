<!DOCTYPE html>
<html>
<head>
    <title>Edit Budget</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>Menu</h2>

        <a href="{{ url_for('dashboard') }}">🏠 Dashboard</a>
        <a href="{{ url_for('charts') }}">📊 Charts</a>
        <a href="{{ url_for('prediction') }}">🔮 Prediction</a>
        <a href="{{ url_for('add_budget') }}" class="active">💼 Budgets</a>
        <a href="{{ url_for('assistant') }}">🤖 AI Assistant</a>
        <a href="{{ url_for('export_csv') }}">📄 CSV</a>
        <a href="{{ url_for('export_pdf') }}">📑 PDF</a>
        <a href="{{ url_for('logout') }}">🚪 Logout</a>

    </div>

    <!-- Main Content -->
    <div class="main-content">

        <div class="topbar">

            <div>
                <h1>💼 Edit Budget</h1>
                <p>Update your budget details</p>
            </div>

        </div>

        <div class="card">

            <h2>📋 Edit Budget Details</h2>

<form method="POST">

    <label>Category</label>
    <input
        type="text"
        name="category"
        value="{{ budget.category }}"
        required>

    <label>Monthly Limit (₹)</label>
    <input
        type="number"
        step="0.01"
        name="monthly_limit"
        value="{{ budget.monthly_limit }}"
        required>

    <button class="add-btn" type="submit">
                    💾 Update Budget
                </button>

</form>
        </div>
    </div>
</div>
</body>
</html>
