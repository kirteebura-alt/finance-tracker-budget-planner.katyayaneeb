<!DOCTYPE html>
<html>
<head>
    <title>Edit Transaction</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>Menu</h2>

        <a href="{{ url_for('dashboard') }}">🏠 Dashboard</a>
        <a href="{{ url_for('charts') }}">📊 Charts</a>
        <a href="{{ url_for('prediction') }}">🔮 Prediction</a>
        <a href="{{ url_for('add_budget') }}">💼 Budgets</a>
        <a href="{{ url_for('assistant') }}">🤖 AI Assistant</a>
        <a href="{{ url_for('export_csv') }}">📄 CSV</a>
        <a href="{{ url_for('export_pdf') }}">📑 PDF</a>
        <a href="{{ url_for('logout') }}">🚪 Logout</a>

    </div>
    <!-- Main Content -->
    <div class="main-content">

        <div class="topbar">

            <div>
                <h1>💳 Edit Transaction</h1>
                <p>Update your income and expenses</p>
            </div>
        </div>
        <div class="card">
    <h2>📋 Edit Transaction Details</h2>

    <form method="POST">

    <div class="form-grid">

        <!-- Category -->
        <div class="form-group">
            <label>📁 Category</label>
            <input type="text"
                   name="category"
                   value="{{ transaction.category }}"
                   required>
        </div>

        <!-- Amount -->
        <div class="form-group">
            <label>💰 Amount</label>
            <input type="number"
                   step="0.01"
                   name="amount"
                   value="{{ transaction.amount }}"
                   required>
        </div>

        <!-- Type -->
        <div class="form-group">
            <label>📌 Type</label>

            <select name="transaction_type">

                <option value="income"
                    {% if transaction.transaction_type == "income" %}
                        selected
                    {% endif %}>
                    💰 Income
                </option>

                <option value="expense"
                    {% if transaction.transaction_type == "expense" %}
                        selected
                    {% endif %}>
                    💸 Expense
                </option>

            </select>
        </div>

        <!-- Recurring -->
        <div class="form-group">
            <label>🔄 Recurring Transaction</label>
            <select name="recurring">
                <option value="No"
                    {% if transaction.recurring == "No" %}
                        selected
                    {% endif %}>
                    No
                </option>
                <option value="Yes"
                    {% if transaction.recurring == "Yes" %}
                        selected
                    {% endif %}>
                    Yes
                </option>
            </select>
        </div>

        <!-- Notes -->
        <div class="form-group full-width">
            <label>📝 Notes</label>

            <input type="text"
                   name="notes"
                   value="{{ transaction.notes }}">
        </div>
    </div>
    </div>

    <div class="btn-center">
        <button type="submit" class="save-btn">
            💾 Update Transaction
        </button>
    </div>

</form>
    </div>
    </div>
</body>
</html>
